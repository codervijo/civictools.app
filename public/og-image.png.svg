  <rect x="580" y="400" width="220" height="48" rx="24" fill="#0f766e" opacity="0.2"/>
  <text x="690" y="430" text-anchor="middle" font-family="Inter, Helvetica, Arial, sans-serif" font-size="20" font-weight="600" fill="#2dd4bf">CA Cities</text>

