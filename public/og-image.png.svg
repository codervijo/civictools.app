  <rect x="0" y="0" width="8" height="630" fill="#0f766e"/>

  <!-- Logo mark -->
  <rect x="80" y="220" width="72" height="72" rx="16" fill="#0f766e"/>
  <polygon points="92,258 116,236 140,258" fill="white" opacity="0.95"/>
  <rect x="92" y="258" width="10" height="20" rx="2" fill="white" opacity="0.95"/>
  <rect x="111" y="258" width="10" height="20" rx="2" fill="white" opacity="0.95"/>
  <rect x="130" y="258" width="10" height="20" rx="2" fill="white" opacity="0.95"/>
  <rect x="88" y="278" width="56" height="7" rx="2" fill="white" opacity="0.95"/>

  <!-- CivicTools wordmark -->
  <text x="172" y="272" font-family="Inter, Helvetica, Arial, sans-serif" font-size="52" font-weight="800" fill="white" letter-spacing="-1">CivicTools</text>

  <!-- Tagline -->
  <text x="80" y="340" font-family="Inter, Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#94a3b8">Simple tools for public data.</text>

